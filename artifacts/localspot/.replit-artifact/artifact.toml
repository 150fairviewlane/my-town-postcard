kind = "web"
previewPath = "/"
title = "LocalSpot Mailer"
version = "1.0.0"
id = "artifacts/localspot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22490

[services.development]
run = "pnpm --filter @workspace/localspot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/localspot", "run", "build" ]
publicDir = "artifacts/localspot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22490"
BASE_PATH = "/"
