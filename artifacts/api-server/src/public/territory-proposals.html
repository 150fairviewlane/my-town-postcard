<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Territory Proposals — My Town Postcard Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --burg:#7C1C2E;--burg-dark:#5a1220;
  --ink:#0f1117;--ink-mid:#374151;--ink-light:#6B7280;
  --surface:#F4F1ED;--card:#fff;--border:#E2DDD6;
  --amber:#F59E0B;--amber-pale:#fef3c7;
}
body{font-family:'DM Sans',sans-serif;background:var(--surface);min-height:100vh;color:var(--ink)}

/* HEADER */
.hdr{background:var(--ink);padding:0 28px;height:54px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--burg);position:sticky;top:0;z-index:1000}
.brand{font-family:'Bebas Neue',sans-serif;font-size:21px;color:#fff;letter-spacing:.08em}
.brand span{color:#C8A882}
.hdr-tag{background:var(--burg);color:#fff;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:4px 12px;border-radius:20px}
.back-link{color:#C8A882;font-size:12px;font-weight:600;text-decoration:none;letter-spacing:.04em;opacity:.85;transition:opacity .15s}
.back-link:hover{opacity:1}

/* MAIN */
.main{max-width:1400px;margin:0 auto;padding:24px}

/* STATS BAR */
.stats-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.stat-btn{padding:8px 18px;border-radius:8px;border:2px solid var(--border);background:var(--card);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;color:var(--ink-mid);transition:all .18s}
.stat-btn:hover{border-color:#aaa}
.stat-btn.act{background:var(--ink);color:#fff;border-color:var(--ink)}
.stat-btn.pend.act{background:var(--burg);border-color:var(--burg)}
.stat-cnt{display:inline-block;min-width:18px;background:rgba(255,255,255,.2);border-radius:10px;padding:0 5px;margin-left:5px;font-size:11px}
.stat-cnt.dk{background:rgba(0,0,0,.12);color:var(--ink-mid)}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.05em;color:var(--ink);margin-bottom:4px}
.page-sub{font-size:13px;color:var(--ink-light);margin-bottom:20px;font-family:'Crimson Pro',serif;font-style:italic}

/* TABLE */
.table-wrap{background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{background:#f8f7f5;padding:10px 14px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-mid);border-bottom:1px solid var(--border)}
tbody tr.prop-row{cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border)}
tbody tr.prop-row:hover{background:#fafaf8}
tbody tr.prop-row.exp{background:#eff6ff}
tbody td{padding:11px 14px;font-size:13px;vertical-align:middle}
tbody tr.det-row td{padding:0;background:#f8f9ff;border-bottom:1px solid var(--border)}
.empty{text-align:center;padding:48px 24px;font-family:'Crimson Pro',serif;font-style:italic;font-size:16px;color:var(--ink-light)}

/* DETAIL PANEL */
.det-panel{padding:20px 20px 24px;border-top:2px solid var(--burg)}
.det-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:16px}
@media(max-width:900px){.det-grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.det-grid{grid-template-columns:1fr}}
.det-section{background:#fff;border-radius:8px;padding:14px;border:1px solid var(--border)}
.det-section h4{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--burg);margin-bottom:10px}
.det-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid #f0ece6;font-size:12px;gap:8px}
.det-row:last-child{border-bottom:none}
.det-lbl{color:var(--ink-light);white-space:nowrap}
.det-val{font-weight:700;color:var(--ink);text-align:right;word-break:break-word}

/* ACTION BAR */
.action-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding-top:12px;border-top:1px solid var(--border);margin-top:4px}
.approve-panel,.reject-panel{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:14px}
.approve-panel{border-left:3px solid #16a34a}
.reject-panel{border-left:3px solid #dc2626}
.panel-title{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px}
.pt-green{color:#15803d}.pt-red{color:#991b1b}

.form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.form-field{flex:1;min-width:160px}
.form-field label{display:block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-mid);margin-bottom:3px}
.form-input{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);background:var(--surface);outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--burg);background:#fff}
textarea.form-input{resize:vertical;min-height:72px}

/* BUTTONS */
.btn{padding:9px 18px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:6px}
.btn-green{background:#16a34a;color:#fff}.btn-green:hover{background:#15803d}
.btn-red{background:#dc2626;color:#fff}.btn-red:hover{background:#b91c1c}
.btn-ghost{background:var(--surface);color:var(--ink-mid);border:1.5px solid var(--border)}.btn-ghost:hover{border-color:#888}
.btn-sm{padding:6px 12px;font-size:12px}
.btn:disabled{opacity:.55;cursor:not-allowed}

/* BADGES */
.badge{display:inline-block;padding:3px 9px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.bp{background:var(--amber-pale);color:#92400e}
.ba{background:#dcfce7;color:#166534}
.br{background:#fee2e2;color:#991b1b}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:10px 22px;border-radius:30px;font-size:13px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,.3);transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:2000;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header class="hdr">
  <div style="display:flex;align-items:center;gap:16px">
    <div class="brand">My Town <span>Postcard</span></div>
    <div class="hdr-tag">📋 Territory Proposals</div>
  </div>
  <div style="display:flex;align-items:center;gap:16px">
    <a id="backLink" class="back-link" href="#">← Admin Dashboard</a>
  </div>
</header>

<div class="toast" id="toast"></div>

<div class="main">
  <div class="page-title">Territory Proposals</div>
  <div class="page-sub">Review, approve, or reject dealer territory requests before they go live.</div>

  <!-- Stats / Filter bar -->
  <div class="stats-bar">
    <button class="stat-btn pend act" onclick="setFilter('pending_review')" id="btnPending">
      Pending <span class="stat-cnt" id="cntPending">0</span>
    </button>
    <button class="stat-btn" onclick="setFilter('approved')" id="btnApproved">
      Approved <span class="stat-cnt dk" id="cntApproved">0</span>
    </button>
    <button class="stat-btn" onclick="setFilter('rejected')" id="btnRejected">
      Rejected <span class="stat-cnt dk" id="cntRejected">0</span>
    </button>
    <button class="stat-btn" onclick="setFilter(null)" id="btnAll">
      All <span class="stat-cnt dk" id="cntAll">0</span>
    </button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Proposed Territory</th>
          <th>State</th>
          <th>Counties</th>
          <th>Businesses</th>
          <th>Dealer Contact</th>
          <th>Submitted</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="8" class="empty">Loading proposals…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
const TOKEN = new URLSearchParams(window.location.search).get('token') || '';
if(!TOKEN){ window.location.href = '/admin'; }
document.getElementById('backLink').href = '/admin?token=' + encodeURIComponent(TOKEN);

let currentFilter = 'pending_review';
let allProposals = [];
let expandedId = null;
let panelState = {}; // id → 'approve' | 'reject' | null

// ── Counts ──────────────────────────────────────────────────
async function loadCounts(){
  const [pr, pa, pj] = await Promise.all([
    fetch('/api/admin/territory-proposals?status=pending_review&limit=1',{headers:{Authorization:`Bearer ${TOKEN}`}}).then(r=>r.json()).catch(()=>({total:0})),
    fetch('/api/admin/territory-proposals?status=approved&limit=1',{headers:{Authorization:`Bearer ${TOKEN}`}}).then(r=>r.json()).catch(()=>({total:0})),
    fetch('/api/admin/territory-proposals?status=rejected&limit=1',{headers:{Authorization:`Bearer ${TOKEN}`}}).then(r=>r.json()).catch(()=>({total:0})),
  ]);
  const pending = pr.total || 0;
  const approved = pa.total || 0;
  const rejected = pj.total || 0;
  document.getElementById('cntPending').textContent  = pending;
  document.getElementById('cntApproved').textContent = approved;
  document.getElementById('cntRejected').textContent = rejected;
  document.getElementById('cntAll').textContent      = pending + approved + rejected;
}

// ── Load proposals ─────────────────────────────────────────
async function loadProposals(){
  const params = new URLSearchParams();
  if(currentFilter) params.set('status', currentFilter);
  params.set('limit','200');
  const resp = await fetch(`/api/admin/territory-proposals?${params}`,{
    headers:{Authorization:`Bearer ${TOKEN}`}
  });
  if(resp.status === 401){ window.location.href = '/admin'; return; }
  const data = await resp.json();
  allProposals = data.proposals || [];
  renderTable();
}

// ── Filter ─────────────────────────────────────────────────
function setFilter(status){
  currentFilter = status;
  ['btnPending','btnApproved','btnRejected','btnAll'].forEach(id => {
    document.getElementById(id)?.classList.remove('act');
  });
  const mapId = {pending_review:'btnPending',approved:'btnApproved',rejected:'btnRejected',null:'btnAll'};
  const key = status === null ? 'null' : status;
  document.getElementById(mapId[key] || 'btnAll')?.classList.add('act');
  expandedId = null;
  panelState = {};
  loadProposals();
}

// ── Render ──────────────────────────────────────────────────
function renderTable(){
  const tbody = document.getElementById('tableBody');
  if(!allProposals.length){
    const label = currentFilter ? currentFilter.replace('_',' ') : '';
    tbody.innerHTML = `<tr><td colspan="8" class="empty">No ${label} proposals found.</td></tr>`;
    return;
  }
  tbody.innerHTML = allProposals.map(p => buildRow(p)).join('');
}

function buildRow(p){
  const isExp = expandedId === p.id;
  const date = p.createdAt
    ? new Date(p.createdAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
    : '—';
  const badgeCls = {pending_review:'bp',approved:'ba',rejected:'br'}[p.status] || 'bp';
  const badgeTxt = {pending_review:'Pending',approved:'Approved',rejected:'Rejected'}[p.status] || p.status;
  const counties = (Array.isArray(p.counties) ? p.counties : []).map(c=>c.shortName||c.name).join(', ') || '—';
  const biz = p.totalBusinessCount != null ? Number(p.totalBusinessCount).toLocaleString() : '—';

  const dealer = p.dealerEmail
    ? `<div style="font-weight:700;font-size:13px">${p.dealerName||'—'}</div><div style="font-size:11px;color:#6b7280">${p.dealerEmail}</div>`
    : `<span style="color:#9ca3af;font-size:12px;font-style:italic">Anonymous preview</span>`;

  const actions = p.status === 'pending_review'
    ? `<button class="btn btn-sm btn-green" onclick="event.stopPropagation();showApprove(${p.id})">✓ Approve</button>
       <button class="btn btn-sm btn-red" onclick="event.stopPropagation();showReject(${p.id})">✗ Reject</button>`
    : p.status === 'approved'
    ? `<span style="color:#16a34a;font-size:12px;font-weight:700">✓ Live</span>`
    : p.status === 'rejected'
    ? `<span style="color:#dc2626;font-size:12px;font-weight:700" title="${esc(p.rejectionReason||'')}">✗ Rejected</span>`
    : '';

  let html = `
    <tr class="prop-row${isExp?' exp':''}" onclick="toggle(${p.id})">
      <td>
        <div style="font-weight:700">${esc(p.proposedName||'—')}</div>
        ${p.topCities&&p.topCities.length?`<div style="font-size:11px;color:#6b7280;margin-top:2px">${esc(p.topCities.slice(0,3).join(', '))}</div>`:''}
      </td>
      <td style="font-family:monospace;font-size:13px">${esc(p.stateFips||'—')}</td>
      <td style="max-width:180px;font-size:12px">${esc(counties)}</td>
      <td style="font-weight:700">${biz}</td>
      <td>${dealer}</td>
      <td style="color:var(--ink-light);font-size:12px">${date}</td>
      <td><span class="badge ${badgeCls}">${badgeTxt}</span></td>
      <td><div style="display:flex;gap:6px;flex-wrap:wrap">${actions}</div></td>
    </tr>
  `;

  if(isExp){
    html += `<tr class="det-row"><td colspan="8">${buildDetail(p)}</td></tr>`;
  }
  return html;
}

function buildDetail(p){
  const ps = panelState[p.id];
  const counties = (Array.isArray(p.counties)?p.counties:[]).map(c=>c.name).join(' · ') || '—';

  return `
    <div class="det-panel">
      <div class="det-grid">

        <div class="det-section">
          <h4>Territory Details</h4>
          <div class="det-row"><span class="det-lbl">Proposed Name</span><span class="det-val">${esc(p.proposedName||'—')}</span></div>
          <div class="det-row"><span class="det-lbl">State FIPS</span><span class="det-val">${esc(p.stateFips||'—')}</span></div>
          <div class="det-row"><span class="det-lbl">County FIPS</span><span class="det-val">${esc(p.countyFips||'—')}</span></div>
          <div class="det-row"><span class="det-lbl">ZIP Code</span><span class="det-val">${esc(p.zipCode||'—')}</span></div>
          ${p.estimatedZones!=null?`<div class="det-row"><span class="det-lbl">Est. Zones</span><span class="det-val">${p.estimatedZones}</span></div>`:''}
          <div class="det-row"><span class="det-lbl">Status</span><span class="det-val">${esc(p.status)}</span></div>
        </div>

        <div class="det-section">
          <h4>Business Intelligence</h4>
          <div class="det-row"><span class="det-lbl">Ad-Ready Businesses</span><span class="det-val">${(p.totalBusinessCount||0).toLocaleString()}</span></div>
          <div class="det-row"><span class="det-lbl">Counties</span><span class="det-val">${esc(counties)}</span></div>
          ${p.topCities&&p.topCities.length?`<div class="det-row"><span class="det-lbl">Key Cities</span><span class="det-val">${esc(p.topCities.join(', '))}</span></div>`:''}
        </div>

        <div class="det-section">
          <h4>Dealer Contact</h4>
          ${p.dealerName?`<div class="det-row"><span class="det-lbl">Name</span><span class="det-val">${esc(p.dealerName)}</span></div>`:''}
          ${p.dealerEmail?`<div class="det-row"><span class="det-lbl">Email</span><span class="det-val"><a href="mailto:${esc(p.dealerEmail)}" style="color:var(--burg)">${esc(p.dealerEmail)}</a></span></div>`:''}
          ${p.dealerPhone?`<div class="det-row"><span class="det-lbl">Phone</span><span class="det-val">${esc(p.dealerPhone)}</span></div>`:''}
          ${!p.dealerEmail?`<div style="font-style:italic;color:#9ca3af;font-size:12px;margin-top:4px">No dealer contact info — this was an anonymous territory preview.</div>`:''}
          ${p.rejectionReason?`<div class="det-row"><span class="det-lbl">Rejection Reason</span><span class="det-val" style="color:#dc2626">${esc(p.rejectionReason)}</span></div>`:''}
        </div>

      </div>

      ${p.status==='pending_review'?`
        <div class="action-bar">
          <button class="btn btn-green" onclick="showApprove(${p.id})">✓ Approve &amp; Activate Territory</button>
          <button class="btn btn-red" onclick="showReject(${p.id})">✗ Reject Proposal</button>
        </div>
      `:''}

      ${ps==='approve'?buildApprovePanel(p):''}
      ${ps==='reject'?buildRejectPanel(p):''}
    </div>
  `;
}

function buildApprovePanel(p){
  return `
    <div class="approve-panel">
      <div class="panel-title pt-green">✓ Approve &amp; Activate Territory</div>
      <div class="form-row">
        <div class="form-field">
          <label>Territory Name (override)</label>
          <input class="form-input" id="an-${p.id}" value="${esc(p.proposedName||'')}" placeholder="Territory name">
        </div>
        <div class="form-field">
          <label>Initial Status</label>
          <select class="form-input" id="as-${p.id}">
            <option value="available">Available (ready to sell)</option>
            <option value="taken">Taken (dealer assigned)</option>
          </select>
        </div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-green" onclick="doApprove(${p.id})">✓ Confirm Approval</button>
        <button class="btn btn-ghost" onclick="closePanel(${p.id})">Cancel</button>
      </div>
    </div>
  `;
}

function buildRejectPanel(p){
  return `
    <div class="reject-panel">
      <div class="panel-title pt-red">✗ Reject Proposal</div>
      <div class="form-field" style="margin-bottom:10px">
        <label>Reason (shared with dealer if contact info is present)</label>
        <textarea class="form-input" id="rr-${p.id}" placeholder="e.g. This area overlaps an existing dealer's territory. We'll notify you when it becomes available."></textarea>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-red" onclick="doReject(${p.id})">✗ Confirm Rejection</button>
        <button class="btn btn-ghost" onclick="closePanel(${p.id})">Cancel</button>
      </div>
    </div>
  `;
}

// ── Row expand ────────────────────────────────────────────────
function toggle(id){
  expandedId = expandedId === id ? null : id;
  renderTable();
}

// ── Action panels ─────────────────────────────────────────────
function showApprove(id){
  if(expandedId !== id) expandedId = id;
  panelState[id] = 'approve';
  renderTable();
  setTimeout(()=>{ const el=document.getElementById(`an-${id}`); if(el) el.closest('.approve-panel').scrollIntoView({behavior:'smooth',block:'nearest'}); },60);
}

function showReject(id){
  if(expandedId !== id) expandedId = id;
  panelState[id] = 'reject';
  renderTable();
  setTimeout(()=>{ const el=document.getElementById(`rr-${id}`); if(el) el.closest('.reject-panel').scrollIntoView({behavior:'smooth',block:'nearest'}); },60);
}

function closePanel(id){
  panelState[id] = null;
  renderTable();
}

// ── API actions ────────────────────────────────────────────────
async function doApprove(id){
  const name   = document.getElementById(`an-${id}`)?.value.trim() || '';
  const status = document.getElementById(`as-${id}`)?.value || 'available';
  try {
    const resp = await fetch(`/api/admin/territory-proposals/${id}/approve`,{
      method:'POST',
      headers:{'Content-Type':'application/json',Authorization:`Bearer ${TOKEN}`},
      body:JSON.stringify({overrides:{name,status}}),
    });
    const data = await resp.json();
    if(!resp.ok) throw new Error(data.error||'Failed');
    showToast('✓ Territory approved and live!');
    expandedId = null; panelState[id] = null;
    await refresh();
  } catch(err){ showToast('Error: '+err.message); }
}

async function doReject(id){
  const reason = document.getElementById(`rr-${id}`)?.value.trim() || 'No reason provided';
  try {
    const resp = await fetch(`/api/admin/territory-proposals/${id}/reject`,{
      method:'POST',
      headers:{'Content-Type':'application/json',Authorization:`Bearer ${TOKEN}`},
      body:JSON.stringify({reason}),
    });
    if(!resp.ok){ const d=await resp.json(); throw new Error(d.error||'Failed'); }
    showToast('Proposal rejected.');
    expandedId = null; panelState[id] = null;
    await refresh();
  } catch(err){ showToast('Error: '+err.message); }
}

async function refresh(){
  await Promise.all([loadProposals(), loadCounts()]);
}

// ── Utilities ─────────────────────────────────────────────────
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ── Init ──────────────────────────────────────────────────────
refresh();
</script>
</body>
</html>
