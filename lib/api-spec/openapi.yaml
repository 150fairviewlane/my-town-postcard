openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: LocalSpot Mailer API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: campaigns
    description: Campaign operations
  - name: spots
    description: Spot operations
  - name: checkout
    description: Payment operations
  - name: admin
    description: Admin operations
  - name: adgen
    description: AI ad generation operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /campaigns/active:
    get:
      operationId: getActiveCampaign
      tags: [campaigns]
      summary: Get active campaign with all spots
      responses:
        "200":
          description: Active campaign with spots
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignWithSpots"
        "404":
          description: No active campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /campaigns/active/taken-categories:
    get:
      operationId: getActiveCampaignTakenCategories
      tags: [campaigns]
      summary: Get taken business categories for the active campaign
      responses:
        "200":
          description: List of taken categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TakenCategoriesResponse"

  /spots/{id}:
    get:
      operationId: getSpot
      tags: [spots]
      summary: Get a single spot by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Spot details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Spot"
        "404":
          description: Spot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /spots/{id}/reserve:
    post:
      operationId: reserveSpot
      tags: [spots]
      summary: Reserve a spot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReserveSpotBody"
      responses:
        "200":
          description: Spot reserved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Spot"
        "400":
          description: Bad request or category taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Spot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /checkout/create-payment-intent:
    post:
      operationId: createPaymentIntent
      tags: [checkout]
      summary: Create a Stripe PaymentIntent for a spot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentIntentBody"
      responses:
        "200":
          description: PaymentIntent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentIntentResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /checkout/confirm:
    post:
      operationId: confirmPayment
      tags: [checkout]
      summary: Confirm payment and mark spot as paid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmPaymentBody"
      responses:
        "200":
          description: Payment confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfirmPaymentResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /spots/{id}/upload-ad:
    post:
      operationId: uploadAd
      tags: [spots]
      summary: Submit ad file URL or request design
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadAdBody"
      responses:
        "200":
          description: Ad uploaded or design requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Spot"
        "404":
          description: Spot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
        "401":
          description: Invalid password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/campaign:
    get:
      operationId: getAdminCampaign
      tags: [admin]
      summary: Get admin campaign overview with all spots
      responses:
        "200":
          description: Campaign with spots and stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCampaignResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/scans:
    get:
      operationId: getAdminScans
      tags: [admin]
      summary: Get QR scan stats grouped by spot
      parameters:
        - name: from
          in: query
          required: false
          description: |
            Optional inclusive lower bound (YYYY-MM-DD, in the server's
            timezone). When set, totalScans and lastScannedAt are scoped
            to scans on or after this date. The 7-day / 30-day windows
            are always relative to "now" and are not affected.
          schema:
            type: string
        - name: to
          in: query
          required: false
          description: Optional inclusive upper bound (YYYY-MM-DD).
          schema:
            type: string
        - name: campaignId
          in: query
          required: false
          description: Optional campaign filter (numeric campaign id).
          schema:
            type: integer
      responses:
        "200":
          description: Per-spot scan stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminScansResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/campaigns:
    get:
      operationId: listAdminCampaigns
      tags: [admin]
      summary: List all campaigns with revenue summaries
      responses:
        "200":
          description: Campaign list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCampaignsListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createCampaign
      tags: [admin]
      summary: Create a new campaign and auto-generate its spot layout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignBody"
      responses:
        "200":
          description: Campaign created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCampaignDetailResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/campaigns/{id}:
    get:
      operationId: getAdminCampaignById
      tags: [admin]
      summary: Get a specific campaign with all spots
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign with spots and stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCampaignDetailResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Campaign not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/campaigns/{id}/activate:
    post:
      operationId: activateCampaign
      tags: [admin]
      summary: Mark a campaign active (demotes any other active campaign to completed)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCampaignDetailResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Campaign not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/campaigns/{id}/complete:
    post:
      operationId: completeCampaign
      tags: [admin]
      summary: Mark a campaign completed and lock its spots
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCampaignDetailResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Campaign not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/outreach:
    get:
      operationId: listOutreachLeads
      tags: [admin]
      summary: List all outreach leads
      responses:
        "200":
          description: Lead list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutreachLeadsListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createOutreachLead
      tags: [admin]
      summary: Create a new outreach lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutreachLeadInput"
      responses:
        "200":
          description: Lead created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutreachLead"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/outreach/{id}:
    patch:
      operationId: updateOutreachLead
      tags: [admin]
      summary: Update an outreach lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutreachLeadUpdate"
      responses:
        "200":
          description: Lead updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutreachLead"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Lead not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteOutreachLead
      tags: [admin]
      summary: Delete an outreach lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lead deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteOutreachLeadResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Lead not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/spots/{id}/approve:
    post:
      operationId: approveAd
      tags: [admin]
      summary: Approve an ad
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ad approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Spot"
        "404":
          description: Spot not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /interest:
    post:
      operationId: submitInterest
      tags: [spots]
      summary: Submit an interest lead for a taken industry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitInterestBody"
      responses:
        "200":
          description: Interest recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitInterestResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /grok-ad-generator/refine:
    post:
      operationId: refineGrokAd
      tags: [adgen]
      summary: Refine a Grok-generated ad image with a plain-English instruction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefineAdRequest"
      responses:
        "200":
          description: Refined ad image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefineAdResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: xAI API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Campaign:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        territory:
          type: string
        zipCode:
          type: string
        mailDate:
          type: ["string", "null"]
        homesCount:
          type: integer
        status:
          type: string
          enum: [draft, active, completed]
        createdAt:
          type: string
      required:
        - id
        - name
        - territory
        - zipCode
        - homesCount
        - status
        - createdAt

    Spot:
      type: object
      properties:
        id:
          type: integer
        campaignId:
          type: integer
        side:
          type: string
          enum: [front, back]
        size:
          type: string
          enum: [xl, large, medium, small]
        gridArea:
          type: string
        price:
          type: integer
        categoryLock:
          type: ["string", "null"]
        status:
          type: string
          enum: [available, reserved, paid]
        businessName:
          type: ["string", "null"]
        businessCategory:
          type: ["string", "null"]
        contactEmail:
          type: ["string", "null"]
        contactPhone:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        adFileUrl:
          type: ["string", "null"]
        adStatus:
          type: ["string", "null"]
        trackingCode:
          type: ["string", "null"]
        templateData:
          type: ["object", "null"]
          additionalProperties: true
        scanCount:
          type: integer
        expiresAt:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - campaignId
        - side
        - size
        - gridArea
        - price
        - status
        - createdAt

    CampaignWithSpots:
      allOf:
        - $ref: "#/components/schemas/Campaign"
        - type: object
          properties:
            spots:
              type: array
              items:
                $ref: "#/components/schemas/Spot"
          required:
            - spots

    ReserveSpotBody:
      type: object
      properties:
        businessName:
          type: string
        businessCategory:
          type: string
        contactEmail:
          type: string
        contactPhone:
          type: string
        website:
          type: string
        templateData:
          type: ["object", "null"]
          additionalProperties: true
      required:
        - businessName
        - businessCategory
        - contactEmail

    CreatePaymentIntentBody:
      type: object
      properties:
        spotId:
          type: integer
      required:
        - spotId

    PaymentIntentResponse:
      type: object
      properties:
        clientSecret:
          type: string
        spotId:
          type: integer
        amount:
          type: integer
        businessName:
          type: ["string", "null"]
        size:
          type: string
          enum: [xl, large, medium, small]
      required:
        - clientSecret
        - spotId
        - amount
        - size

    ConfirmPaymentBody:
      type: object
      properties:
        paymentIntentId:
          type: string
        spotId:
          type: integer
      required:
        - paymentIntentId
        - spotId

    ConfirmPaymentResponse:
      type: object
      properties:
        success:
          type: boolean
        orderId:
          type: integer
      required:
        - success
        - orderId

    UploadAdBody:
      type: object
      properties:
        adFileUrl:
          type: ["string", "null"]
        designRequested:
          type: boolean
      required:
        - designRequested

    AdminLoginBody:
      type: object
      properties:
        password:
          type: string
      required:
        - password

    AdminLoginResponse:
      type: object
      properties:
        token:
          type: string
      required:
        - token

    AdminSpotRow:
      allOf:
        - $ref: "#/components/schemas/Spot"
        - type: object
          properties:
            isPaid:
              type: boolean
            stripePaymentIntentId:
              type: ["string", "null"]
          required:
            - isPaid

    ScanStats:
      type: object
      properties:
        spotId:
          type: integer
        businessName:
          type: ["string", "null"]
        industry:
          type: ["string", "null"]
        size:
          type: string
          enum: [xl, large, medium, small]
        campaignId:
          type: integer
        campaignName:
          type: ["string", "null"]
        trackingCode:
          type: ["string", "null"]
        totalScans:
          type: integer
        scansLast7Days:
          type: integer
        scansLast30Days:
          type: integer
        lastScannedAt:
          type: ["string", "null"]
      required:
        - spotId
        - size
        - campaignId
        - totalScans
        - scansLast7Days
        - scansLast30Days

    AdminScansResponse:
      type: object
      properties:
        scans:
          type: array
          items:
            $ref: "#/components/schemas/ScanStats"
      required:
        - scans

    AdminCampaignResponse:
      type: object
      properties:
        campaign:
          $ref: "#/components/schemas/Campaign"
        spots:
          type: array
          items:
            $ref: "#/components/schemas/AdminSpotRow"
        totalRevenue:
          type: integer
        totalSpots:
          type: integer
        paidSpots:
          type: integer
      required:
        - campaign
        - spots
        - totalRevenue
        - totalSpots
        - paidSpots

    CreateCampaignBody:
      type: object
      properties:
        name:
          type: string
        territory:
          type: string
        zipCode:
          type: string
        homesCount:
          type: integer
        mailDate:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, active, completed]
      required:
        - name
        - territory
        - zipCode
        - homesCount

    CampaignSummary:
      allOf:
        - $ref: "#/components/schemas/Campaign"
        - type: object
          properties:
            totalSpots:
              type: integer
            paidSpots:
              type: integer
            availableSpots:
              type: integer
            totalRevenue:
              type: integer
          required:
            - totalSpots
            - paidSpots
            - availableSpots
            - totalRevenue

    AdminCampaignsListResponse:
      type: object
      properties:
        campaigns:
          type: array
          items:
            $ref: "#/components/schemas/CampaignSummary"
      required:
        - campaigns

    OutreachLead:
      type: object
      properties:
        id:
          type: integer
        businessName:
          type: string
        ownerName:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        industry:
          type: ["string", "null"]
        town:
          type: ["string", "null"]
        contactMethod:
          type: string
          enum: [facebook, phone, email, in-person, other]
        status:
          type: string
          enum: [not-contacted, contacted, interested, reserved, paid, passed]
        notes:
          type: ["string", "null"]
        contactedAt:
          type: ["string", "null"]
        followUpDate:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - businessName
        - contactMethod
        - status
        - createdAt

    OutreachLeadInput:
      type: object
      properties:
        businessName:
          type: string
        ownerName:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        industry:
          type: ["string", "null"]
        town:
          type: ["string", "null"]
        contactMethod:
          type: string
          enum: [facebook, phone, email, in-person, other]
        status:
          type: string
          enum: [not-contacted, contacted, interested, reserved, paid, passed]
        notes:
          type: ["string", "null"]
        followUpDate:
          type: ["string", "null"]
      required:
        - businessName

    OutreachLeadUpdate:
      type: object
      properties:
        businessName:
          type: string
        ownerName:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        industry:
          type: ["string", "null"]
        town:
          type: ["string", "null"]
        contactMethod:
          type: string
          enum: [facebook, phone, email, in-person, other]
        status:
          type: string
          enum: [not-contacted, contacted, interested, reserved, paid, passed]
        notes:
          type: ["string", "null"]
        followUpDate:
          type: ["string", "null"]
        markContactedNow:
          type: boolean
          description: When true, set contactedAt to the server's current time

    OutreachLeadsListResponse:
      type: object
      properties:
        leads:
          type: array
          items:
            $ref: "#/components/schemas/OutreachLead"
      required:
        - leads

    DeleteOutreachLeadResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    SubmitInterestBody:
      type: object
      properties:
        name:
          type: string
        businessName:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        industry:
          type: string
        options:
          type: array
          items:
            type: string
      required:
        - businessName
        - email
        - industry

    TakenCategoriesResponse:
      type: object
      properties:
        takenCategories:
          type: array
          items:
            type: string
      required:
        - takenCategories

    RefineAdRequest:
      type: object
      properties:
        imageDataUrl:
          type: string
          description: Base64 data URL of the currently generated ad image
        instruction:
          type: string
          description: Plain-English description of the change to apply
          maxLength: 500
        sizeKey:
          type: string
          description: Spot size key (XL, L, M, S)
          default: XL
      required:
        - imageDataUrl
        - instruction

    RefineAdResponse:
      type: object
      properties:
        imageUrl:
          type: string
          description: Base64 data URL of the refined ad image
      required:
        - imageUrl

    SubmitInterestResponse:
      type: object
      properties:
        success:
          type: boolean
        id:
          type: integer
      required:
        - success
        - id

    AdminCampaignDetailResponse:
      allOf:
        - $ref: "#/components/schemas/AdminCampaignResponse"
        - type: object
